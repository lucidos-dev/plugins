id = "browser-learning"
version = "0.3.0"
name = "Browser Learning"
description = "Self-healing site knowhow for browser automation. Ships two knowhow files: observation (loaded by agents during browser tasks, records BrowserLearningObserved events) and reflection (loaded by a periodic pass that folds those observations into per-domain site knowhow)."
source = "https://github.com/lucidos-dev/plugins/tree/main/browser-learning"
setup = """
This plugin is knowhow-only. To make the self-healing loop actually run, set up a periodic reflection trigger:

- Create a cron trigger that runs the `browser-knowhow-reflection` intent (loads `knowhow/browser-learning/reflection.md`).
- A reasonable default is daily at 4am: cron `0 0 4 * * *`. Heavy browser users may want every 6h; light users weekly.
- Confirm the cadence with the user before creating the trigger -- schedules are workspace state and shouldn't be hardcoded.

The observation knowhow is loaded automatically when agents do browser work; no wiring needed there.
"""
